apiVersion: v1
kind: Service
metadata:
  name: photon-api
  namespace: photon
spec:
  selector:
    app: photon-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: photon-api
  namespace: photon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: photon-api
  template:
    metadata:
      labels:
        app: photon-api
    spec:
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          envFrom:
            - configMapRef:
                name: photon-config
            - secretRef:
                name: photon-secrets
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  key: PHOTON_POSTGRES_PASSWORD
                  name: photon-secrets
          command:
            - sh
            - -c
            - |
              until pg_isready \
                -h "$PHOTON_POSTGRES_HOST" \
                -p "$PHOTON_POSTGRES_PORT" \
                -U "$PHOTON_POSTGRES_USER" \
                -d "$PHOTON_POSTGRES_DB"; do
                sleep 2
              done
        - name: migrate
          image: photon-migrate:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: photon-config
            - secretRef:
                name: photon-secrets
        - name: wait-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              until redis-cli -h photon-redis ping; do
                sleep 2
              done
        - name: ensure-bucket
          image: minio/mc:latest
          envFrom:
            - configMapRef:
                name: photon-config
            - secretRef:
                name: photon-secrets
          command:
            - sh
            - -c
            - |
              until mc alias set local http://photon-minio:9000 "$PHOTON_STORAGE_ACCESS_KEY" "$PHOTON_STORAGE_SECRET_KEY" >/dev/null 2>&1; do
                sleep 2
              done
              mc mb --ignore-existing "local/$PHOTON_STORAGE_BUCKET" >/dev/null
      containers:
        - name: api
          image: photon-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: photon-config
            - secretRef:
                name: photon-secrets
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: photon-worker
  namespace: photon
spec:
  selector:
    app: photon-worker
  ports:
    - name: metrics
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: photon-worker
  namespace: photon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: photon-worker
  template:
    metadata:
      labels:
        app: photon-worker
    spec:
      initContainers:
        - name: wait-postgres-schema
          image: postgres:16-alpine
          envFrom:
            - configMapRef:
                name: photon-config
            - secretRef:
                name: photon-secrets
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  key: PHOTON_POSTGRES_PASSWORD
                  name: photon-secrets
          command:
            - sh
            - -c
            - |
              until [ "$(
                psql \
                  -h "$PHOTON_POSTGRES_HOST" \
                  -p "$PHOTON_POSTGRES_PORT" \
                  -U "$PHOTON_POSTGRES_USER" \
                  -d "$PHOTON_POSTGRES_DB" \
                  -tAc "SELECT CASE WHEN to_regclass('public.jobs') IS NOT NULL THEN 1 ELSE 0 END"
              )" = "1" ]; do
                sleep 2
              done
        - name: wait-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              until redis-cli -h photon-redis ping; do
                sleep 2
              done
        - name: ensure-bucket
          image: minio/mc:latest
          envFrom:
            - configMapRef:
                name: photon-config
            - secretRef:
                name: photon-secrets
          command:
            - sh
            - -c
            - |
              until mc alias set local http://photon-minio:9000 "$PHOTON_STORAGE_ACCESS_KEY" "$PHOTON_STORAGE_SECRET_KEY" >/dev/null 2>&1; do
                sleep 2
              done
              mc mb --ignore-existing "local/$PHOTON_STORAGE_BUCKET" >/dev/null
      containers:
        - name: worker
          image: photon-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: photon-config
            - secretRef:
                name: photon-secrets
          ports:
            - containerPort: 8081
              name: metrics
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 10
---
