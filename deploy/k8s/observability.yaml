apiVersion: v1
kind: ConfigMap
metadata:
  name: photon-prometheus-config
  namespace: photon
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - 127.0.0.1:9090

      - job_name: photon-api
        static_configs:
          - targets:
              - photon-api:8080

      - job_name: photon-worker
        static_configs:
          - targets:
              - photon-worker:8081
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: photon-grafana-datasources
  namespace: photon
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://photon-prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: Service
metadata:
  name: photon-prometheus
  namespace: photon
spec:
  selector:
    app: photon-prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: photon-prometheus
  namespace: photon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: photon-prometheus
  template:
    metadata:
      labels:
        app: photon-prometheus
    spec:
      securityContext:
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.52.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
          ports:
            - containerPort: 9090
              name: http
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - mountPath: /etc/prometheus/prometheus.yml
              name: config
              subPath: prometheus.yml
            - mountPath: /prometheus
              name: data
      volumes:
        - name: config
          configMap:
            name: photon-prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: photon-grafana
  namespace: photon
spec:
  selector:
    app: photon-grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: photon-grafana
  namespace: photon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: photon-grafana
  template:
    metadata:
      labels:
        app: photon-grafana
    spec:
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.4.3
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: GF_SECURITY_ADMIN_PASSWORD
                  name: photon-secrets
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  key: GF_SECURITY_ADMIN_USER
                  name: photon-secrets
            - name: GF_SERVER_ROOT_URL
              valueFrom:
                configMapKeyRef:
                  key: GF_SERVER_ROOT_URL
                  name: photon-config
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              name: datasources
              subPath: datasources.yaml
            - mountPath: /var/lib/grafana
              name: data
      volumes:
        - name: datasources
          configMap:
            name: photon-grafana-datasources
        - name: data
          emptyDir: {}
