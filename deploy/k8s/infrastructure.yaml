apiVersion: v1
kind: Service
metadata:
  name: photon-postgres
  namespace: photon
spec:
  selector:
    app: photon-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: photon-postgres
  namespace: photon
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: photon-postgres
  template:
    metadata:
      labels:
        app: photon-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  key: PHOTON_POSTGRES_DB
                  name: photon-config
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: POSTGRES_PASSWORD
                  name: photon-secrets
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  key: PHOTON_POSTGRES_USER
                  name: photon-config
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: photon-redis
  namespace: photon
spec:
  selector:
    app: photon-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: photon-redis
  namespace: photon
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: photon-redis
  template:
    metadata:
      labels:
        app: photon-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - redis-server
            - --appendonly
            - "yes"
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - mountPath: /data
              name: redis-data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: photon-minio
  namespace: photon
spec:
  selector:
    app: photon-minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: photon-minio
  namespace: photon
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: photon-minio
  template:
    metadata:
      labels:
        app: photon-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - :9001
          env:
            - name: MINIO_API_CORS_ALLOW_ORIGIN
              valueFrom:
                configMapKeyRef:
                  key: MINIO_API_CORS_ALLOW_ORIGIN
                  name: photon-config
            - name: MINIO_BROWSER_REDIRECT_URL
              valueFrom:
                configMapKeyRef:
                  key: MINIO_BROWSER_REDIRECT_URL
                  name: photon-config
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: MINIO_ROOT_PASSWORD
                  name: photon-secrets
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  key: MINIO_ROOT_USER
                  name: photon-secrets
            - name: MINIO_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  key: MINIO_SERVER_URL
                  name: photon-config
          ports:
            - containerPort: 9000
              name: s3
            - containerPort: 9001
              name: console
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - mountPath: /data
              name: minio-data
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-data
