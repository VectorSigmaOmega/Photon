apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: photon-api
  namespace: photon
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - photon.abhinash.dev
  rules:
    - host: photon.abhinash.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: photon-api
                port:
                  name: http
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: swiftbatch-home-redirect
  namespace: photon
spec:
  redirectRegex:
    regex: ^https://swiftbatch\.abhinash\.dev/.*$
    replacement: https://photon.abhinash.dev/
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: swiftbatch-home-redirect
  namespace: photon
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    traefik.ingress.kubernetes.io/router.middlewares: photon-swiftbatch-home-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - swiftbatch.abhinash.dev
  rules:
    - host: swiftbatch.abhinash.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: photon-api
                port:
                  name: http
