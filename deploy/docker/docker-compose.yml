services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PHOTON_POSTGRES_DB:-photon}
      POSTGRES_PASSWORD: ${PHOTON_POSTGRES_PASSWORD:-photon}
      POSTGRES_USER: ${PHOTON_POSTGRES_USER:-photon}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PHOTON_POSTGRES_USER:-photon} -d ${PHOTON_POSTGRES_DB:-photon}",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-http://localhost:18080}
      MINIO_ROOT_PASSWORD: ${PHOTON_STORAGE_SECRET_KEY:-minioadmin}
      MINIO_ROOT_USER: ${PHOTON_STORAGE_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${PHOTON_STORAGE_ACCESS_KEY:-minioadmin} ${PHOTON_STORAGE_SECRET_KEY:-minioadmin}; do
        sleep 2;
      done;
      mc mb --ignore-existing local/${PHOTON_STORAGE_BUCKET:-photon};
      exit 0;
      "

  migrate:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PHOTON_ENV: ${PHOTON_ENV:-development}
      PHOTON_POSTGRES_DB: ${PHOTON_POSTGRES_DB:-photon}
      PHOTON_POSTGRES_HOST: postgres
      PHOTON_POSTGRES_PASSWORD: ${PHOTON_POSTGRES_PASSWORD:-photon}
      PHOTON_POSTGRES_PORT: ${PHOTON_POSTGRES_PORT:-5432}
      PHOTON_POSTGRES_SSLMODE: ${PHOTON_POSTGRES_SSLMODE:-disable}
      PHOTON_POSTGRES_USER: ${PHOTON_POSTGRES_USER:-photon}
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    depends_on:
      createbuckets:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PHOTON_API_ADDR: :8080
      PHOTON_ENV: ${PHOTON_ENV:-development}
      PHOTON_POSTGRES_DB: ${PHOTON_POSTGRES_DB:-photon}
      PHOTON_POSTGRES_HOST: postgres
      PHOTON_POSTGRES_PASSWORD: ${PHOTON_POSTGRES_PASSWORD:-photon}
      PHOTON_POSTGRES_PORT: ${PHOTON_POSTGRES_PORT:-5432}
      PHOTON_POSTGRES_SSLMODE: ${PHOTON_POSTGRES_SSLMODE:-disable}
      PHOTON_POSTGRES_USER: ${PHOTON_POSTGRES_USER:-photon}
      PHOTON_REDIS_ADDR: redis:6379
      PHOTON_REDIS_DB: ${PHOTON_REDIS_DB:-0}
      PHOTON_REDIS_DLQ_KEY: ${PHOTON_REDIS_DLQ_KEY:-photon:jobs:dlq}
      PHOTON_REDIS_MAX_RETRIES: ${PHOTON_REDIS_MAX_RETRIES:-3}
      PHOTON_REDIS_PASSWORD: ${PHOTON_REDIS_PASSWORD:-}
      PHOTON_REDIS_QUEUE_KEY: ${PHOTON_REDIS_QUEUE_KEY:-photon:jobs}
      PHOTON_STORAGE_ACCESS_KEY: ${PHOTON_STORAGE_ACCESS_KEY:-minioadmin}
      PHOTON_STORAGE_BUCKET: ${PHOTON_STORAGE_BUCKET:-photon}
      PHOTON_STORAGE_ENDPOINT: minio:9000
      PHOTON_STORAGE_PUBLIC_BASE_URL: ${PHOTON_STORAGE_PUBLIC_BASE_URL:-http://localhost:9000}
      PHOTON_STORAGE_REGION: ${PHOTON_STORAGE_REGION:-us-east-1}
      PHOTON_STORAGE_SECRET_KEY: ${PHOTON_STORAGE_SECRET_KEY:-minioadmin}
      PHOTON_STORAGE_DOWNLOAD_URL_TTL: ${PHOTON_STORAGE_DOWNLOAD_URL_TTL:-30m}
      PHOTON_STORAGE_UPLOAD_URL_TTL: ${PHOTON_STORAGE_UPLOAD_URL_TTL:-15m}
      PHOTON_STORAGE_USE_SSL: ${PHOTON_STORAGE_USE_SSL:-false}
    ports:
      - "${PHOTON_API_PUBLISHED_PORT:-18080}:8080"

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PHOTON_ENV: ${PHOTON_ENV:-development}
      PHOTON_POSTGRES_DB: ${PHOTON_POSTGRES_DB:-photon}
      PHOTON_POSTGRES_HOST: postgres
      PHOTON_POSTGRES_PASSWORD: ${PHOTON_POSTGRES_PASSWORD:-photon}
      PHOTON_POSTGRES_PORT: ${PHOTON_POSTGRES_PORT:-5432}
      PHOTON_POSTGRES_SSLMODE: ${PHOTON_POSTGRES_SSLMODE:-disable}
      PHOTON_POSTGRES_USER: ${PHOTON_POSTGRES_USER:-photon}
      PHOTON_REDIS_ADDR: redis:6379
      PHOTON_REDIS_DB: ${PHOTON_REDIS_DB:-0}
      PHOTON_REDIS_DLQ_KEY: ${PHOTON_REDIS_DLQ_KEY:-photon:jobs:dlq}
      PHOTON_REDIS_MAX_RETRIES: ${PHOTON_REDIS_MAX_RETRIES:-3}
      PHOTON_REDIS_PASSWORD: ${PHOTON_REDIS_PASSWORD:-}
      PHOTON_REDIS_QUEUE_KEY: ${PHOTON_REDIS_QUEUE_KEY:-photon:jobs}
      PHOTON_WORKER_METRICS_ADDR: ${PHOTON_WORKER_METRICS_ADDR:-:8081}
      PHOTON_STORAGE_ACCESS_KEY: ${PHOTON_STORAGE_ACCESS_KEY:-minioadmin}
      PHOTON_STORAGE_BUCKET: ${PHOTON_STORAGE_BUCKET:-photon}
      PHOTON_STORAGE_ENDPOINT: minio:9000
      PHOTON_STORAGE_PUBLIC_BASE_URL: ${PHOTON_STORAGE_PUBLIC_BASE_URL:-http://localhost:9000}
      PHOTON_STORAGE_REGION: ${PHOTON_STORAGE_REGION:-us-east-1}
      PHOTON_STORAGE_SECRET_KEY: ${PHOTON_STORAGE_SECRET_KEY:-minioadmin}
      PHOTON_STORAGE_DOWNLOAD_URL_TTL: ${PHOTON_STORAGE_DOWNLOAD_URL_TTL:-30m}
      PHOTON_STORAGE_UPLOAD_URL_TTL: ${PHOTON_STORAGE_UPLOAD_URL_TTL:-15m}
      PHOTON_STORAGE_USE_SSL: ${PHOTON_STORAGE_USE_SSL:-false}
    ports:
      - "${PHOTON_WORKER_METRICS_PUBLISHED_PORT:-18081}:8081"

  cleanup:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.cleanup
    command: ["serve"]
    depends_on:
      createbuckets:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PHOTON_CLEANUP_BATCH_SIZE: ${PHOTON_CLEANUP_BATCH_SIZE:-50}
      PHOTON_CLEANUP_DLQ_RETENTION: ${PHOTON_CLEANUP_DLQ_RETENTION:-168h}
      PHOTON_CLEANUP_ENABLED: ${PHOTON_CLEANUP_ENABLED:-true}
      PHOTON_CLEANUP_INTERVAL: ${PHOTON_CLEANUP_INTERVAL:-6h}
      PHOTON_CLEANUP_JOB_RETENTION: ${PHOTON_CLEANUP_JOB_RETENTION:-168h}
      PHOTON_CLEANUP_STARTUP_JITTER: ${PHOTON_CLEANUP_STARTUP_JITTER:-0s}
      PHOTON_ENV: ${PHOTON_ENV:-development}
      PHOTON_POSTGRES_DB: ${PHOTON_POSTGRES_DB:-photon}
      PHOTON_POSTGRES_HOST: postgres
      PHOTON_POSTGRES_PASSWORD: ${PHOTON_POSTGRES_PASSWORD:-photon}
      PHOTON_POSTGRES_PORT: ${PHOTON_POSTGRES_PORT:-5432}
      PHOTON_POSTGRES_SSLMODE: ${PHOTON_POSTGRES_SSLMODE:-disable}
      PHOTON_POSTGRES_USER: ${PHOTON_POSTGRES_USER:-photon}
      PHOTON_REDIS_ADDR: redis:6379
      PHOTON_REDIS_DB: ${PHOTON_REDIS_DB:-0}
      PHOTON_REDIS_DLQ_KEY: ${PHOTON_REDIS_DLQ_KEY:-photon:jobs:dlq}
      PHOTON_REDIS_MAX_RETRIES: ${PHOTON_REDIS_MAX_RETRIES:-3}
      PHOTON_REDIS_PASSWORD: ${PHOTON_REDIS_PASSWORD:-}
      PHOTON_REDIS_QUEUE_KEY: ${PHOTON_REDIS_QUEUE_KEY:-photon:jobs}
      PHOTON_STORAGE_ACCESS_KEY: ${PHOTON_STORAGE_ACCESS_KEY:-minioadmin}
      PHOTON_STORAGE_BUCKET: ${PHOTON_STORAGE_BUCKET:-photon}
      PHOTON_STORAGE_ENDPOINT: minio:9000
      PHOTON_STORAGE_PUBLIC_BASE_URL: ${PHOTON_STORAGE_PUBLIC_BASE_URL:-http://localhost:9000}
      PHOTON_STORAGE_REGION: ${PHOTON_STORAGE_REGION:-us-east-1}
      PHOTON_STORAGE_SECRET_KEY: ${PHOTON_STORAGE_SECRET_KEY:-minioadmin}
      PHOTON_STORAGE_DOWNLOAD_URL_TTL: ${PHOTON_STORAGE_DOWNLOAD_URL_TTL:-30m}
      PHOTON_STORAGE_UPLOAD_URL_TTL: ${PHOTON_STORAGE_UPLOAD_URL_TTL:-15m}
      PHOTON_STORAGE_USE_SSL: ${PHOTON_STORAGE_USE_SSL:-false}

volumes:
  minio-data:
  postgres-data:
  redis-data:
